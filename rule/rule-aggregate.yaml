base:
  blackmatrix7_raw: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash"

log:
  path: "rule/list/build-log.md"

groups:
  Google:
    outputs:
      non_ip:
        path: "rule/list/non_ip/google.txt"
        include: [DOMAIN, DOMAIN-SUFFIX, DOMAIN-KEYWORD, DOMAIN-WILDCARD, DOMAIN-REGEX]
      ip:
        path: "rule/list/ip/google.txt"
        include: [IP-CIDR, IP-CIDR6, IP-SUFFIX, IP-ASN]
    sources:
      - Google
      - GoogleDrive
      - GoogleSearch
      - GoogleVoice
      - Chromecast
      - GoogleFCM

  # 微软    
