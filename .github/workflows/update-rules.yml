name: Update Rules

on:
  schedule:
    - cron: "0 2 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: update-rules-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate rules
        run: python3 scripts/aggregate_rules.py --config rule/rule-aggregate.yaml

      - name: Commit changes
        run: |
          if git diff --quiet -- rule; then
            echo "No rule changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rule
          git commit -m "chore: update aggregated rules"
          git push origin HEAD:${{ github.ref_name }}
